<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="description" content="POS Bar floor terminal — tabs, orders, and bills.">
  <meta name="theme-color" content="#f59e0b">
  <!-- Replaced at container start from Railway variables (see deploy/docker-entrypoint.sh) -->
  <meta name="pos-online-api-base-url" content="__POS_ONLINE_API_BASE_URL__">
  <meta name="pos-api-base-url" content="__POS_API_BASE_URL__">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="POS Bar Floor">

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="pwa-update.css">

  <title>POS Bar Floor Terminal</title>

  <script>
    // Replaced after `flutter build web` by scripts/stamp-pwa-release.sh (or deploy entrypoint).
    const serviceWorkerVersion = "__SW_VERSION__";
  </script>
  <script src="flutter.js" defer></script>
</head>
<body>
  <div id="app-loading" aria-live="polite">
    <div class="spinner" role="progressbar" aria-label="Loading"></div>
    <p>Loading POS Bar Floor Terminal…</p>
  </div>
  <div id="pwa-update-banner" role="alert" aria-live="assertive">
    <span>A new version is ready.</span>
    <button type="button" id="pwa-update-reload">Update now</button>
  </div>
  <script src="thermal-printer.js"></script>
  <script src="pwa-update.js"></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('app-loading');
      if (el) el.remove();
    });

    window.addEventListener('load', function () {
      if (typeof _flutter === 'undefined' || !_flutter.loader) {
        console.error('flutter.js failed to load');
        return;
      }
      var swVersion = serviceWorkerVersion === '__SW_VERSION__' ? null : serviceWorkerVersion;
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: swVersion,
        },
        onEntrypointLoaded: function (engineInitializer) {
          engineInitializer.initializeEngine().then(function (appRunner) {
            appRunner.runApp();
          });
        },
      });
    });
  </script>
</body>
</html>
